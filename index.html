<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nomi 记账本!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C81E3A;
    --red-dark: #A4172F;
    --ink: #1A1A1A;
    --gray: #8A8A8A;
    --gray-light: #B5B5B5;
    --border: #E7E5E1;
    --bg-soft: #FAFAF9;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'ZCOOL XiaoWei', serif;
    background: #fff;
    color: var(--ink);
    padding: 48px 20px;
    font-size: 16px;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  .mono {
    font-family: 'JetBrains Mono', monospace;
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .tab {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--gray);
    background: none;
    border: none;
    padding: 10px 4px;
    margin-right: 24px;
    cursor: pointer;
    position: relative;
    top: 1px;
  }

  .tab.active {
    color: var(--ink);
    border-bottom: 2px solid var(--red);
  }

  .tab:hover:not(.active) { color: var(--ink); }

  .panel { display: none; }
  .panel.active { display: block; }

  .entry-row {
    display: grid;
    grid-template-columns: 1fr 130px auto;
    gap: 10px;
    margin-bottom: 24px;
  }

  input {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-soft);
    color: var(--ink);
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  input:focus {
    outline: none;
    border-color: var(--red);
    background: #fff;
  }

  #expPrice, #incPrice {
    font-family: 'JetBrains Mono', monospace;
  }

  button.add-btn {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 14px;
    font-weight: 600;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  button.add-btn:hover { background: var(--red-dark); }
  button.add-btn:active { transform: scale(0.97); }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }

  thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gray);
    padding: 0 8px 10px;
    border-bottom: 1px solid var(--border);
  }

  th.num, td.num { text-align: right; }
  th.del, td.del { width: 32px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
  }

  tbody tr:hover { background: var(--bg-soft); }

  tbody td {
    padding: 12px 8px;
    font-size: 14px;
  }

  td.date {
    color: var(--gray-light);
    font-size: 12px;
    white-space: nowrap;
  }

  td.num {
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }

  .empty-row td {
    padding: 28px 8px;
    text-align: center;
    color: var(--gray-light);
    font-size: 13px;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--gray-light);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s ease, background 0.15s ease;
  }

  .del-btn:hover { color: var(--red); background: #FBEAEC; }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .export-btn {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 13px;
    font-weight: 500;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .export-btn:hover { background: var(--bg-soft); border-color: var(--gray-light); }
  .export-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .export-btn:disabled:hover { background: none; border-color: var(--border); }

  .total-label {
    font-size: 12px;
    color: var(--gray);
    margin-right: 6px;
  }

  .total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--red);
  }

  .currency-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .rate-note {
    font-size: 12px;
    color: var(--gray-light);
    font-family: 'JetBrains Mono', monospace;
  }

  .currency-toggle {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    background: var(--bg-soft);
  }

  .currency-toggle button {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 13px;
    border: none;
    background: none;
    color: var(--gray);
    padding: 5px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .currency-toggle button.active {
    background: var(--red);
    color: #fff;
  }

</style>
</head>
<body>
<div class="container">

  <div class="currency-row">
    <span class="rate-note" id="rate-note"></span>
    <div class="currency-toggle">
      <button id="cur-cny" class="active" onclick="setCurrency('CNY')">人民币</button>
      <button id="cur-usd" onclick="setCurrency('USD')">美元</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="expenses" onclick="showTab('expenses')">购物</button>
    <button class="tab" data-tab="income" onclick="showTab('income')">资金</button>
  </div>

  <div class="panel active" id="panel-expenses">
    <div class="entry-row">
      <input type="text" id="expName">
      <input type="number" id="expPrice" step="0.01">
      <button class="add-btn" onclick="addEntry('expenses')">添加</button>
    </div>

    <table>
      <thead>
        <tr><th>日期</th><th>名称</th><th class="num">金额</th><th class="del"></th></tr>
      </thead>
      <tbody id="expenses-body"></tbody>
    </table>

    <div class="footer-row">
      <button class="export-btn" id="export-expenses" onclick="exportCSV('expenses')">导出 CSV</button>
      <div><span class="total-label">总计</span><span class="total" id="expenses-total">¥0.00</span></div>
    </div>
  </div>

  <div class="panel" id="panel-income">
    <div class="entry-row">
      <input type="text" id="incName">
      <input type="number" id="incPrice" step="0.01">
      <button class="add-btn" onclick="addEntry('income')">添加</button>
    </div>

    <table>
      <thead>
        <tr><th>日期</th><th>名称</th><th class="num">金额</th><th class="del"></th></tr>
      </thead>
      <tbody id="income-body"></tbody>
    </table>

    <div class="footer-row">
      <button class="export-btn" id="export-income" onclick="exportCSV('income')">导出 CSV</button>
      <div><span class="total-label">总计</span><span class="total" id="income-total">¥0.00</span></div>
    </div>
  </div>

</div>

<script>
  const DB_NAME = 'BudgetDB';
  const STORE_NAME = 'budget';
  const KEY = 'data';
  let data = { expenses: [], income: [] };
  let db;

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = () => {
        req.result.createObjectStore(STORE_NAME);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function load() {
    return new Promise((resolve) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).get(KEY);
      req.onsuccess = () => resolve(req.result || { expenses: [], income: [] });
      req.onerror = () => resolve({ expenses: [], income: [] });
    });
  }

  function save() {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(data, KEY);
  }

  async function init() {
    db = await openDB();
    data = await load();
    updateRateNote();
    render();
    fetchRate();
  }

  let currency = 'CNY';
  let exchangeRate = 7.2; // CNY per 1 USD — fallback until live rate loads

  async function fetchRate() {
    try {
      const res = await fetch('https://open.er-api.com/v6/latest/USD');
      const json = await res.json();
      if (json && json.rates && json.rates.CNY) {
        exchangeRate = json.rates.CNY;
      }
    } catch (e) {
      // fetch failed (offline, blocked, etc) — keep fallback rate
    }
    updateRateNote();
    render();
  }

  function updateRateNote() {
    document.getElementById('rate-note').textContent = `1 美元 ≈ ${exchangeRate.toFixed(2)} 人民币`;
  }

  function toDisplay(cnyValue) {
    return currency === 'CNY' ? cnyValue : cnyValue / exchangeRate;
  }

  function toCanonical(enteredValue) {
    return currency === 'CNY' ? enteredValue : enteredValue * exchangeRate;
  }

  function money(n) {
    const symbol = currency === 'CNY' ? '¥' : '$';
    return symbol + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function setCurrency(cur) {
    currency = cur;
    document.getElementById('cur-cny').classList.toggle('active', cur === 'CNY');
    document.getElementById('cur-usd').classList.toggle('active', cur === 'USD');
    render();
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function render() {
    ['expenses', 'income'].forEach(type => {
      const body = document.getElementById(type + '-body');
      body.innerHTML = '';

      if (data[type].length === 0) {
        const label = type === 'expenses' ? '购物' : '钱';
        body.innerHTML = `<tr class="empty-row"><td colspan="4">还没有${label}记录</td></tr>`;
      } else {
        data[type].forEach((entry, i) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="date">${entry.date}</td>
            <td>${escapeHtml(entry.name)}</td>
            <td class="num">${money(toDisplay(entry.price))}</td>
            <td class="del"><button class="del-btn" onclick="removeEntry('${type}', ${i})">✕</button></td>
          `;
          body.appendChild(row);
        });
      }

      const total = data[type].reduce((s, e) => s + e.price, 0);
      document.getElementById(type + '-total').textContent = money(toDisplay(total));
      document.getElementById('export-' + type).disabled = data[type].length === 0;
    });
  }

  function addEntry(type) {
    const nameInput = document.getElementById(type === 'expenses' ? 'expName' : 'incName');
    const priceInput = document.getElementById(type === 'expenses' ? 'expPrice' : 'incPrice');
    const name = nameInput.value.trim();
    const price = parseFloat(priceInput.value);

    if (!name || isNaN(price)) return;
    if (type === 'expenses' && price < 0) return;

    const canonicalPrice = toCanonical(price);
    data[type].push({ name, price: canonicalPrice, date: new Date().toISOString().slice(0, 10) });
    save();
    render();
    nameInput.value = '';
    priceInput.value = '';
    nameInput.focus();
  }

  function removeEntry(type, index) {
    data[type].splice(index, 1);
    save();
    render();
  }

  function exportCSV(type) {
    if (data[type].length === 0) return;
    const rows = [['日期', '名称', `金额 (${currency})`]];
    data[type].forEach(e => rows.push([e.date, e.name, toDisplay(e.price).toFixed(2)]));
    rows.push(['', '总计', toDisplay(data[type].reduce((s, e) => s + e.price, 0)).toFixed(2)]);
    const csv = rows.map(row =>
      row.map(f => /[",\n]/.test(f) ? '"' + String(f).replace(/"/g, '""') + '"' : f).join(',')
    ).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = type + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('panel-expenses').classList.toggle('active', tab === 'expenses');
    document.getElementById('panel-income').classList.toggle('active', tab === 'income');
  }

  ['expName', 'expPrice'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') addEntry('expenses'); });
  });
  ['incName', 'incPrice'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') addEntry('income'); });
  });

  init();
</script>
</body>
</html>
